:root {
  --bg: #262d31;
  --bg-top: #3d454a;
  --bg-bottom: #1a2024;
  --bg-2: #181e21;
  --surface: #1d2427;
  --surface-hover: #232b2f;
  --ink: #f4efe9;
  --ink-dim: #b7c0c3;
  --ink-mute: #7c868a;
  --ember: #f51919;
  --flame: #e4382a;
  --line: rgba(244, 239, 233, 0.09);
  --line-strong: rgba(244, 239, 233, 0.16);
  --shadow: rgba(0, 0, 0, 0.45);
  --focus: #ff5c42;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 42%, var(--bg-bottom) 100%);
  color-scheme: dark;
}

body {
  min-height: 100dvh;
  font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6vh 5vw;
  overflow-x: hidden;
  position: relative;
}

/* ambient ember glow field */
body::before,
body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  filter: blur(60px);
}
body::before {
  width: 46vw;
  height: 46vw;
  max-width: 620px;
  max-height: 620px;
  top: -14vw;
  right: -12vw;
  background: radial-gradient(circle, rgba(245, 25, 25, 0.22), rgba(245, 25, 25, 0) 70%);
  animation: ember-pulse 9s ease-in-out infinite;
}
body::after {
  width: 34vw;
  height: 34vw;
  max-width: 460px;
  max-height: 460px;
  bottom: -10vw;
  left: -8vw;
  background: radial-gradient(circle, rgba(228, 56, 42, 0.14), rgba(228, 56, 42, 0) 70%);
  animation: ember-pulse 11s ease-in-out infinite reverse;
}

@keyframes ember-pulse {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.08); }
}

@media (prefers-reduced-motion: reduce) {
  body::before, body::after { animation: none; }
}

.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 460px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  text-align: center;
}

.brand-mark {
  height: 48px;
  width: auto;
  opacity: 0.92;
}

.avatar {
  position: relative;
  width: 152px;
  height: 152px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  box-shadow: 0 18px 40px var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.02);
}
.avatar::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  padding: 1px;
  background: conic-gradient(from 200deg, var(--ember), var(--flame), transparent 55%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.85;
}
.avatar-img {
  display: block;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.identity {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.name {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  font-weight: 800;
  font-size: clamp(2.4rem, 8vw, 3.4rem);
  line-height: 1.02;
  letter-spacing: -0.02em;
  text-wrap: balance;
  color: var(--ink);
}

.role {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 0.82rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--flame);
}

.divider {
  width: 48px;
  height: 2px;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--ember), var(--flame));
  border: none;
  margin: 0;
}

.channels {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.channel {
  --glow: var(--flame);
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 14px 18px;
  border-radius: 14px;
  background: var(--surface);
  border: 1px solid var(--line);
  text-decoration: none;
  color: var(--ink);
  cursor: pointer;
  font-family: inherit;
  text-align: left;
  transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
}
.channel:hover,
.channel:focus-visible {
  background: var(--surface-hover);
  border-color: rgba(228, 56, 42, 0.35);
  transform: translateY(-2px);
  box-shadow: 0 10px 26px var(--shadow), 0 0 0 1px rgba(228, 56, 42, 0.12);
}
.channel:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
}
.channel:active { transform: translateY(0); }

.channel-icon {
  flex: none;
  width: 46px;
  height: 46px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(228, 56, 42, 0.1);
  color: var(--flame);
}
.channel-icon svg { width: 23px; height: 23px; }

.channel-text {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.channel-label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.channel-value {
  font-size: 0.98rem;
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.channel-hint {
  flex: none;
  font-size: 0.72rem;
  color: var(--ink-mute);
  font-weight: 600;
  letter-spacing: 0.04em;
  opacity: 0;
  transition: opacity 0.18s ease;
}
.channel:hover .channel-hint,
.channel:focus-visible .channel-hint { opacity: 1; }

@media (max-width: 380px) {
  .channel-value {
    font-size: 0.82rem;
    white-space: normal;
    overflow: visible;
    text-overflow: clip;
    word-break: break-all;
  }
}
</style>
</head>
